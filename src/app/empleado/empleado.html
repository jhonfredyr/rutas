<h1>formulario usuario</h1>
<form (ngSubmit)="guardar()">
    <label>nombre</label>
    <input [(ngModel)]="nombre" name = "nombre" placeholder = "escriba nombre">
    <label>documento</label>
    <input [(ngModel)]="documento" name="documento" placeholder="escriba el documento">
    <label>ampleado</label>
    <input [(ngModel)]="empleado" name="empleado" placeholder="escriba el empleado">
    <label>salario</label>
    <input [(ngModel)]="salario" name="salario" placeholder="escriba su salario">

    <button type="submit">guardar</button>
    
</form>

<table>
    <tr>
        <th>nombre</th>
        <th>documento</th>
        <th>empleado</th>
        <th>salario</th>
    </tr>
    <tr *ngFor="let i of listaempleado ">
    <td> {{i.nombre}}</td>
    <td>{{i.documento}}</td>
    <td>{{i.empleado}}</td>
    <td>{{i.salario}}</td>

</tr>
</table>
